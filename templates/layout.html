<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Q&A ChatBot{% endblock %}</title>
    <!-- Google Font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050608;
            --bg-elevated: #11121a;
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.15);
            --accent-strong: #818cf8;
            --text-primary: #f9fafb;
            --text-muted: #9ca3af;
            --border-subtle: #1f2933;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #111827 0, #050608 40%, #000 100%);
            color: var(--text-primary);
        }

        a {
            color: var(--accent-strong);
            text-decoration: none;
            position: relative;
            font-weight: 500;
        }

        a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-strong));
            transition: width 0.25s ease-out;
        }

        a:hover::after {
            width: 100%;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        header {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 0.03em;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        nav {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        nav a {
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid transparent;
            background: linear-gradient(120deg, rgba(79, 70, 229, 0.1), rgba(17, 24, 39, 0.9));
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.1);
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border-color 0.15s ease-out;
        }

        nav a:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.7);
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-subtle);
            margin: 12px 0 0;
        }

        main {
            margin-top: 24px;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.12), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.09), transparent 55%),
                        var(--bg-elevated);
            border-radius: 18px;
            padding: 20px 18px 22px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 22px 60px rgba(15, 23, 42, 0.7);
        }

        h2 {
            margin-top: 0;
            font-size: 1.4rem;
        }

        p, li {
            color: var(--text-muted);
        }

        /* Form and button base styles to look good on dark background */
        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background-color: #020617;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
        }

        input::placeholder,
        textarea::placeholder {
            color: #6b7280;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.5);
        }

        button {
            padding: 9px 18px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(120deg, var(--accent), var(--accent-strong));
            color: #f9fafb;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.45);
            transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, filter 0.12s ease-out;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
            box-shadow: 0 14px 35px rgba(37, 99, 235, 0.55);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.45);
        }

        .status-text {
            margin-top: 12px;
            font-size: 0.9rem;
        }

        .status-text.error {
            color: var(--danger);
        }

        .status-text.success {
            color: var(--success);
        }

        @media (max-width: 640px) {
            .container {
                padding: 18px 14px 32px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            nav {
                flex-wrap: wrap;
            }

            main {
                padding: 16px 14px 20px;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Q&A ChatBot</h1>
                <div class="tagline">Knowledge-driven answers in a sleek dark interface.</div>
            </div>
            <nav>
                <a href="/home">Crawler</a>
                <a href="/chat">Chat</a>
            </nav>
            <hr />
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
